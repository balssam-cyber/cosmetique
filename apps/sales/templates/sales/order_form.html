{% extends 'base.html' %}
{% block title %}Commande vente{% endblock %}
{% block page_title %}{% if order %}Editer commande{% else %}Nouvelle commande vente{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-12 col-lg-7">
<div class="card"><div class="card-body">
<form method="post">{% csrf_token %}
<div class="row g-3">
    <div class="col-md-4"><label class="form-label">N commande *</label><input type="text" name="order_number" class="form-control" value="{{ order.order_number|default:'' }}" required></div>
    <div class="col-md-4"><label class="form-label">Client *</label>
        <select name="customer" class="form-select" required>
            <option value="">Selectionner...</option>
            {% for c in customers %}<option value="{{ c.pk }}" {% if order.customer_id == c.pk %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4"><label class="form-label">Statut</label>
        <select name="status" class="form-select">{% for val, label in status_choices %}<option value="{{ val }}" {% if order.status == val %}selected{% endif %}>{{ label }}</option>{% endfor %}</select>
    </div>
    <div class="col-md-4"><label class="form-label">Date commande *</label><input type="date" name="order_date" class="form-control" value="{{ order.order_date|date:'Y-m-d'|default:'' }}" required></div>
    <div class="col-md-4"><label class="form-label">Date livraison</label><input type="date" name="delivery_date" class="form-control" value="{{ order.delivery_date|date:'Y-m-d'|default:'' }}"></div>
    <div class="col-md-3"><label class="form-label">Remise globale (%)</label><input type="number" step="0.01" name="discount" class="form-control text-danger" value="{{ order.discount|floatformat:2|default:'0' }}"></div>
    
    <div class="col-12 mt-4"><h6 class="border-bottom pb-2 text-brand">Facturation & Paiement</h6></div>
    <div class="col-md-4"><label class="form-label">N° Facture</label><input type="text" name="invoice_number" class="form-control" value="{{ order.invoice_number|default:'' }}"></div>
    <div class="col-md-4"><label class="form-label">TVA (%)</label><input type="number" step="0.01" name="tva_rate" class="form-control" value="{{ order.tva_rate|floatformat:2|default:'19.00' }}"></div>
    <div class="col-md-4"><label class="form-label">Statut Paiement</label>
        <select name="payment_status" class="form-select">{% for val, label in payment_choices %}<option value="{{ val }}" {% if order.payment_status == val %}selected{% endif %}>{{ label }}</option>{% endfor %}</select>
    </div>

    <div class="col-12 mt-3"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ order.notes|default:'' }}</textarea></div>
    <div class="col-12 d-flex gap-2"><button type="submit" class="btn btn-brand">Enregistrer</button><a href="{% url 'sales:order_list' %}" class="btn btn-outline-secondary">Annuler</a></div>
</div>
</form></div></div>
</div></div>
{% endblock %}
