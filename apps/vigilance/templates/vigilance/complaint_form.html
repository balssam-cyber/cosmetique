{% extends 'base.html' %}
{% block title %}{% if complaint %}Modifier{% else %}Ajouter{% endif %} une Plainte{% endblock %}

{% block content %}
<div class="card shadow-sm max-w-lg mx-auto">
    <div class="card-header fw-bold">{% if complaint %}Modifier la Plainte {{ complaint.reference }}{% else %}Nouvelle Plainte{% endif %}</div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Client *</label>
                    <select name="customer" class="form-select" required>
                        <option value="">Sélectionnez un client...</option>
                        {% for c in customers %}
                        <option value="{{ c.pk }}" {% if complaint and complaint.customer.pk == c.pk %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date Déclaration *</label>
                    <input type="date" name="date_received" class="form-control" value="{{ complaint.date_received|date:'Y-m-d'|default:'' }}" required>
                </div>
                
                <div class="col-md-12">
                    <label class="form-label">Lot de Produit (Optionnel)</label>
                    <select name="lot" class="form-select">
                        <option value="">Aucun/Non spécifié...</option>
                        {% for l in lots %}
                        <option value="{{ l.pk }}" {% if complaint and complaint.lot and complaint.lot.pk == l.pk %}selected{% endif %}>{{ l.lot_number }} - {{ l.material.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Gravité *</label>
                    <select name="severity" class="form-select" required>
                        {% for val, label in severity_choices %}
                            <option value="{{ val }}" {% if complaint and complaint.severity == val %}selected{% elif not complaint and val == 'low' %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Statut *</label>
                    <select name="status" class="form-select" required>
                        {% for val, label in status_choices %}
                            <option value="{{ val }}" {% if complaint and complaint.status == val %}selected{% elif not complaint and val == 'open' %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Description du problème *</label>
                    <textarea name="description" class="form-control" rows="4" required placeholder="Décrivez les symptômes rapportés par le client...">{{ complaint.description|default:'' }}</textarea>
                </div>

                <div class="col-12 border-top pt-3 mt-4">
                    <label class="form-label text-success fw-bold">Actions Correctives (CAPA)</label>
                    <textarea name="action_taken" class="form-control border-success" rows="4" placeholder="Investigaton effectuée, causes, retrait du marché...">{{ complaint.action_taken|default:'' }}</textarea>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-brand">Enregistrer</button>
                    <a href="{% if complaint %}{% url 'vigilance:complaint_detail' complaint.pk %}{% else %}{% url 'vigilance:complaint_list' %}{% endif %}" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
