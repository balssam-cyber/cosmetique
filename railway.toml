[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --no-input"

[deploy]
startCommand = "python manage.py migrate && gunicorn cosmo_erp.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environments.production.variables]
DJANGO_SETTINGS_MODULE = "cosmo_erp.settings"
PYTHONUNBUFFERED = "1"
